<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TransitLearn — Bus Driver Training Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:#0A0C0F; --ink2:#111418; --ink3:#181C22; --ink4:#1E232B; --panel:#242A34;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#E8EAF0; --text2:#8B919E; --text3:#555D6B;
  --amber:#F5A623; --amber-dim:rgba(245,166,35,0.15); --amber-glow:rgba(245,166,35,0.08);
  --teal:#2DD4BF; --teal-dim:rgba(45,212,191,0.12);
  --red:#F87171; --red-dim:rgba(248,113,113,0.12);
  --green:#4ADE80; --green-dim:rgba(74,222,128,0.12);
  --blue:#60A5FA; --blue-dim:rgba(96,165,250,0.12);
  --font-head:'Barlow Condensed',sans-serif; --font-body:'Barlow',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --r:6px; --r2:10px;
}
body { font-family:var(--font-body); background:var(--ink); color:var(--text); line-height:1.5; overflow-x:hidden; }
.app { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:220px; min-width:220px; background:var(--ink2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:52px; min-height:52px; background:var(--ink2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:16px; }
.content { flex:1; overflow-y:auto; padding:28px; }
.sb-logo { padding:20px 18px 16px; border-bottom:1px solid var(--border); }
.sb-logo-mark { font-family:var(--font-head); font-size:18px; font-weight:800; color:var(--amber); letter-spacing:0.04em; line-height:1; }
.sb-logo-mark span { color:var(--text3); }
.sb-logo-sub { font-size:10px; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; }
.sb-portal-switch { padding:10px 10px 0; display:flex; flex-direction:column; gap:4px; }
.portal-btn { width:100%; padding:7px 10px; border-radius:var(--r); border:1px solid var(--border); background:transparent; color:var(--text2); font-family:var(--font-body); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .15s; }
.portal-btn:hover { background:var(--ink3); color:var(--text); }
.portal-btn.active { background:var(--amber-dim); border-color:var(--amber); color:var(--amber); }
.sb-nav { padding:16px 10px; flex:1; }
.sb-section { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text3); padding:0 8px; margin:16px 0 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--r); color:var(--text2); font-size:13px; cursor:pointer; transition:all .15s; border:1px solid transparent; margin-bottom:1px; position:relative; }
.nav-item:hover { background:var(--ink3); color:var(--text); }
.nav-item.active { background:var(--ink4); color:var(--text); border-color:var(--border2); }
.nav-item.active::before { content:''; position:absolute; left:10px; width:3px; height:18px; background:var(--amber); border-radius:2px; }
.nav-icon { font-size:15px; min-width:18px; text-align:center; }
.sb-user { padding:12px 14px; border-top:1px solid var(--border); margin-top:auto; display:flex; align-items:center; gap:8px; }
.tb-title { font-family:var(--font-head); font-size:20px; font-weight:700; letter-spacing:0.02em; color:var(--text); flex:1; }
.tb-badge { font-size:10px; font-family:var(--font-mono); padding:3px 8px; border-radius:3px; border:1px solid var(--amber); background:var(--amber-dim); color:var(--amber); letter-spacing:0.05em; }
.tb-badge.teal { background:var(--teal-dim); border-color:var(--teal); color:var(--teal); }
.tb-badge.blue { background:var(--blue-dim); border-color:var(--blue); color:var(--blue); }
.tb-avatar { width:32px; height:32px; border-radius:50%; background:var(--amber-dim); border:1px solid var(--amber); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--amber); cursor:pointer; flex-shrink:0; }
.tb-avatar.teal { background:var(--teal-dim); border-color:var(--teal); color:var(--teal); }
.tb-search { background:var(--ink3); border:1px solid var(--border); border-radius:var(--r); padding:6px 12px; color:var(--text2); font-family:var(--font-body); font-size:13px; width:200px; outline:none; }
.tb-search:focus { border-color:var(--border2); color:var(--text); }
.tb-search::placeholder { color:var(--text3); }
.card { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r2); padding:20px; }
.card-accent-amber { border-left:3px solid var(--amber) !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.card-accent-teal  { border-left:3px solid var(--teal) !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.card-accent-red   { border-left:3px solid var(--red) !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.card-accent-blue  { border-left:3px solid var(--blue) !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.card-accent-green { border-left:3px solid var(--green) !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.card-accent-purple{ border-left:3px solid #a78bfa !important; border-radius:0 var(--r2) var(--r2) 0 !important; }
.stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.stat-tile { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r2); padding:18px 20px; position:relative; overflow:hidden; }
.stat-tile::after { content:''; position:absolute; top:-20px; right:-20px; width:60px; height:60px; border-radius:50%; opacity:0.06; }
.stat-tile.amber::after { background:var(--amber); } .stat-tile.teal::after { background:var(--teal); }
.stat-tile.red::after   { background:var(--red); }   .stat-tile.green::after { background:var(--green); }
.stat-label { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }
.stat-val { font-family:var(--font-head); font-size:36px; font-weight:800; line-height:1; margin-bottom:4px; }
.stat-tile.amber .stat-val { color:var(--amber); } .stat-tile.teal .stat-val { color:var(--teal); }
.stat-tile.red .stat-val   { color:var(--red); }   .stat-tile.green .stat-val { color:var(--green); }
.stat-delta { font-size:11px; color:var(--text3); }
.stat-delta .up { color:var(--green); } .stat-delta .down { color:var(--red); }
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { border-bottom:1px solid var(--border2); }
th { text-align:left; padding:10px 14px; font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--text3); white-space:nowrap; }
td { padding:11px 14px; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); color:var(--text); }
.badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; padding:3px 8px; border-radius:3px; }
.badge-amber { background:var(--amber-dim); color:var(--amber); } .badge-teal { background:var(--teal-dim); color:var(--teal); }
.badge-red   { background:var(--red-dim); color:var(--red); }     .badge-green{ background:var(--green-dim); color:var(--green); }
.badge-blue  { background:var(--blue-dim); color:var(--blue); }   .badge-gray { background:rgba(255,255,255,0.06); color:var(--text2); }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--r); border:1px solid; font-family:var(--font-body); font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn-primary { background:var(--amber); border-color:var(--amber); color:var(--ink); }
.btn-primary:hover { background:#F0A020; }
.btn-ghost { background:transparent; border-color:var(--border2); color:var(--text2); }
.btn-ghost:hover { background:var(--ink3); color:var(--text); }
.btn-teal { background:var(--teal-dim); border-color:var(--teal); color:var(--teal); }
.btn-teal:hover { background:rgba(45,212,191,0.2); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.prog-bar { height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.prog-amber { background:var(--amber); } .prog-teal { background:var(--teal); }
.prog-green { background:var(--green); } .prog-red   { background:var(--red); }
.sec-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.sec-title { font-family:var(--font-head); font-size:16px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--text); }
.sec-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.g2  { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.g3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.g2-1{ display:grid; grid-template-columns:2fr 1fr; gap:16px; }
.mb16{ margin-bottom:16px; } .mb24{ margin-bottom:24px; }
.flex{ display:flex; } .flex-col{ display:flex; flex-direction:column; }
.items-center{ align-items:center; } .justify-between{ justify-content:space-between; }
.gap8{ gap:8px; } .gap12{ gap:12px; } .gap16{ gap:16px; } .w100{ width:100%; }
.separator{ height:1px; background:var(--border); margin:16px 0; }
.mono { font-family:var(--font-mono); font-size:11.5px; }
.text-amber{ color:var(--amber); } .text-teal{ color:var(--teal); } .text-green{ color:var(--green); } .text-red{ color:var(--red); }
.text-muted{ color:var(--text3); } .text-sm{ font-size:12px; } .fw6{ font-weight:600; }
.chip { display:inline-flex; align-items:center; padding:3px 8px; background:var(--ink3); border:1px solid var(--border); border-radius:20px; font-size:11px; color:var(--text2); }
.avatar-sm { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; background:var(--amber-dim); border:1px solid var(--amber); color:var(--amber); flex-shrink:0; }
.video-player { background:#000; border-radius:var(--r2); aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; border:1px solid var(--border); cursor:pointer; user-select:none; }
.video-overlay { position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,0,0,0.6) 0%,transparent 60%); }
.video-play-btn { width:56px; height:56px; background:rgba(245,166,35,0.9); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; position:relative; z-index:2; transition:transform .15s; }
.video-play-btn:hover { transform:scale(1.08); background:var(--amber); }
.video-controls { position:absolute; bottom:0; left:0; right:0; padding:12px 16px; background:linear-gradient(to top,rgba(0,0,0,0.8),transparent); z-index:2; }
.video-info { position:absolute; top:12px; left:14px; z-index:2; }
.drm-badge { font-size:9px; font-family:var(--font-mono); padding:2px 6px; background:rgba(245,166,35,0.2); border:1px solid var(--amber); color:var(--amber); border-radius:2px; letter-spacing:0.1em; }
.video-bg { width:100%; height:100%; background:linear-gradient(135deg,#1a1f2a 0%,#0d1117 100%); display:flex; align-items:center; justify-content:center; font-size:48px; opacity:0.3; position:absolute; inset:0; }
.quiz-question { font-size:15px; font-weight:500; color:var(--text); margin-bottom:18px; line-height:1.5; }
.quiz-option { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--r); border:1px solid var(--border); background:var(--ink3); cursor:pointer; margin-bottom:8px; transition:all .15s; font-size:13px; color:var(--text2); }
.quiz-option:hover { border-color:var(--border2); color:var(--text); background:var(--ink4); }
.quiz-option.selected { border-color:var(--amber); color:var(--amber); background:var(--amber-glow); }
.quiz-option.correct  { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.quiz-option.wrong    { border-color:var(--red);   color:var(--red);   background:var(--red-dim); }
.quiz-radio { width:16px; height:16px; border-radius:50%; border:2px solid var(--text3); min-width:16px; display:flex; align-items:center; justify-content:center; font-size:9px; }
.quiz-option.selected .quiz-radio { border-color:var(--amber); background:var(--amber); color:#000; }
.quiz-option.correct  .quiz-radio { border-color:var(--green); background:var(--green); color:#000; }
.quiz-option.wrong    .quiz-radio { border-color:var(--red);   background:var(--red);   color:#000; }
.skill-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.skill-name { font-size:12px; color:var(--text2); min-width:175px; }
.skill-dots { display:flex; gap:4px; }
.skill-dot { width:24px; height:24px; border-radius:4px; border:1px solid var(--border); background:var(--ink3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:10px; color:var(--text3); transition:all .12s; }
.skill-dot.filled      { background:var(--amber-dim); border-color:var(--amber); color:var(--amber); }
.skill-dot.filled.high { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.skill-dot.filled.low  { background:var(--red-dim);   border-color:var(--red);   color:var(--red); }
.form-group { margin-bottom:16px; }
.form-label { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin-bottom:6px; display:block; }
.form-input { width:100%; background:var(--ink3); border:1px solid var(--border); border-radius:var(--r); padding:9px 12px; color:var(--text); font-family:var(--font-body); font-size:13px; outline:none; transition:border-color .15s; }
.form-input:focus { border-color:var(--amber); }
.form-input::placeholder { color:var(--text3); }
select.form-input option { background:var(--ink2); }
textarea.form-input { resize:vertical; min-height:80px; }
.tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.tab { padding:8px 16px; font-size:13px; font-weight:500; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--amber); border-bottom-color:var(--amber); }
.mini-chart { display:flex; align-items:flex-end; gap:4px; height:56px; }
.bar { flex:1; border-radius:2px 2px 0 0; min-width:8px; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--ink4); border-radius:4px; }
@keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeSlide .25s ease forwards; }
.hidden { display:none !important; }
</style>
</head>

// ── Helpers ────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = {
    'Completed':'badge-green','Published':'badge-teal','Draft':'badge-gray',
    'In-Service':'badge-blue','Pre-Service':'badge-amber','Both':'badge-blue',
    'OK':'badge-green','At Risk':'badge-amber','Overdue':'badge-red',
    'Pending Sign-off':'badge-amber','Active':'badge-green','Revoked':'badge-red','Expired':'badge-red',
  };
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
}

function progBar(pct, cls='prog-amber') {
  return `<div class="prog-bar"><div class="prog-fill ${cls}" style="width:${pct}%"></div></div>`;
}

function circleSVG(pct, color, size=48) {
  const r = (size-6)/2;
  const circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central"
      fill="${color}" font-size="10" font-weight="700" font-family="'JetBrains Mono',monospace">${pct}%</text>
  </svg>`;
}

function miniBarChart(data, color) {
  const max = Math.max(...data);
  return `<div class="mini-chart">${data.map((v,i)=>
    `<div class="bar" style="height:${(v/max)*100}%;background:${i===data.length-1?color:color+'55'}"></div>`
  ).join('')}</div>`;
}

// ── Navigation ─────────────────────────────────────────────────────
function switchPortal(p) {
  portal = p;
  view = {admin:'dashboard',trainer:'courses',driver:'mycourses'}[p];
  document.querySelectorAll('.portal-btn').forEach(b=>b.classList.toggle('active', b.dataset.portal===p));
  const info = PORTALS[p];
  document.getElementById('tb-badge').textContent = info.badge;
  document.getElementById('tb-badge').className = `tb-badge ${info.badgeCls}`;
  document.getElementById('tb-avatar').textContent = info.avatar;
  document.getElementById('sb-avatar').textContent = info.avatar;
  document.getElementById('sb-name').textContent = info.name;
  document.getElementById('sb-role').textContent = info.label;
  renderNav();
  renderPage();
}

function setView(v) {
  view = v;
  renderNav();
  renderPage();
}

function renderNav() {
  const nav = NAV[portal];
  let html = '';
  nav.forEach(sec => {
    html += `<div class="sb-section">${sec.section}</div>`;
    sec.items.forEach(item => {
      html += `<div class="nav-item ${view===item.id?'active':''}" onclick="setView('${item.id}')">
        <span class="nav-icon">${item.icon}</span>
        <span style="flex:1">${item.label}</span>
        ${item.badge?`<span class="badge badge-amber" style="font-size:9px;padding:1px 5px">${item.badge}</span>`:''}
      </div>`;
    });
  });
  document.getElementById('sb-nav').innerHTML = html;
  document.getElementById('tb-title').textContent = TOPBAR_TITLE[view] || view;
}

// ── Page renders ───────────────────────────────────────────────────
function renderPage() {
  document.getElementById('tb-title').textContent = TOPBAR_TITLE[view] || view;
  const el = document.getElementById('content');
  el.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'fade-in';
  div.innerHTML = getPageHTML();
  el.appendChild(div);
  attachPageEvents();
}

function getPageHTML() {
  if (portal==='admin') {
    if (view==='dashboard') return adminDashHTML();
    if (view==='drivers')   return driversHTML();
    if (view==='drm')       return drmHTML();
    if (view==='reports')   return reportsHTML();
    if (view==='audit')     return auditHTML();
  }
  if (portal==='trainer') {
    if (view==='courses')   return coursesHTML();
    if (view==='btw')       return btwHTML('trainer');
    if (view==='mydrivers') return driversHTML();
  }
  if (portal==='driver') {
    if (view==='mycourses') return myCoursesHTML();
    if (view==='quiz')      return quizPageHTML();
    if (view==='btwlog')    return btwHTML('driver');
    if (view==='progress')  return driverDashHTML();
  }
  return genericHTML(TOPBAR_TITLE[view]||view);
}

// ── Video player logic ─────────────────────────────────────────────
let videoInterval = null, videoPct = 34, videoPlaying = false;
function initVideo() { videoPct=34; videoPlaying=false; updateVideoUI(); }
function toggleVideo() {
  videoPlaying = !videoPlaying;
  if (videoPlaying) {
    videoInterval = setInterval(()=>{
      videoPct = Math.min(100, videoPct+1);
      updateVideoUI();
      if (videoPct>=100){ clearInterval(videoInterval); videoPlaying=false; updateVideoUI(); }
    }, 300);
  } else { clearInterval(videoInterval); }
  updateVideoUI();
}
function updateVideoUI() {
  const prog = document.getElementById('vprog');
  const btn  = document.getElementById('play-btn');
  const time = document.getElementById('vtime');
  if (prog) prog.style.width = videoPct+'%';
  if (btn)  btn.textContent = videoPlaying?'⏸':'▶';
  if (time) time.textContent = Math.floor((videoPct/100)*38)+':00';
}

      <div style="font-size:48px;margin-bottom:12px">${s.score===3?'🏆':s.score>=2?'✅':'📝'}</div>
      <div style="font-family:var(--font-head);font-size:28px;font-weight:800;color:${col}">${s.score}/${QUIZ_QS.length} CORRECT</div>
      <div style="color:var(--text3);font-size:13px;margin-top:6px;margin-bottom:20px">${s.score===3?'Excellent work — full marks':'Review flagged questions before your next attempt'}</div>
      ${progBar(pct, pct>=80?'prog-green':pct>=60?'prog-amber':'prog-red')}
      <div style="font-size:11px;color:var(--text3);margin:8px 0 20px">Passing threshold: 80%</div>
      <button class="btn btn-primary" onclick="resetQuiz()">Retake Quiz</button>
    </div>`;
  }
  const q = QUIZ_QS[s.qi];
  const pBarPct = Math.round(((s.qi+1)/QUIZ_QS.length)*100);
  return `
  <div class="flex justify-between items-center" style="margin-bottom:16px">
    <div class="flex gap8 items-center">
      <span class="mono text-muted">Q${s.qi+1}/${QUIZ_QS.length}</span>
      <div class="prog-bar" style="width:120px"><div class="prog-fill prog-amber" style="width:${pBarPct}%"></div></div>
    </div>
    <span class="badge badge-amber">⏱ 2:34 left</span>
  </div>
  <p class="quiz-question">${q.q}</p>
  ${q.opts.map((opt,i)=>{
    let cls = 'quiz-option';
    let inner = '';
    if (s.revealed) {
      if (i===q.correct)       { cls += ' correct'; inner='✓'; }
      else if (i===s.sel)      { cls += ' wrong';   inner='✗'; }
    } else if (i===s.sel)      { cls += ' selected'; }
    return `<div class="${cls}" onclick="${s.revealed?'':'quizSelect('+i+')'}">
      <div class="quiz-radio">${inner}</div>
      <span>${opt}</span>
    </div>`;
  }).join('')}
  <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
    ${!s.revealed
      ? `<button class="btn btn-primary" ${s.sel===null?'disabled':''} onclick="quizSubmit()">Submit Answer</button>`
      : `<button class="btn btn-primary" onclick="quizNext()">${s.qi===QUIZ_QS.length-1?'View Results':'Next Question →'}</button>
         <div style="font-size:12px;color:${s.sel===q.correct?'var(--green)':'var(--red)'}">${s.sel===q.correct?'✓ Correct!':'✗ Incorrect — correct answer highlighted'}</div>`}
  </div>`;
}

function quizSelect(i) { quizState.sel=i; document.getElementById('quiz-box').innerHTML=renderQuizBox(); }
function quizSubmit() {
  if (quizState.sel===null) return;
  quizState.revealed=true;
  if (quizState.sel===QUIZ_QS[quizState.qi].correct) quizState.score++;
  document.getElementById('quiz-box').innerHTML=renderQuizBox();
}
function quizNext() {
  if (quizState.qi===QUIZ_QS.length-1) { quizState.done=true; }
  else { quizState.qi++; quizState.sel=null; quizState.revealed=false; }
  document.getElementById('quiz-box').innerHTML=renderQuizBox();
}
function resetQuiz() { quizState={qi:0,sel:null,revealed:false,score:0,done:false}; document.getElementById('quiz-box').innerHTML=renderQuizBox(); }

let driverFilter='All', driverSearch='';
function filterDrivers(q) { driverSearch=q; applyDriverFilter(); }
function filterDriverStatus(s) {
  driverFilter=s;
  ['All','Pre-Service','In-Service'].forEach(x=>{
    const b=document.getElementById('f-'+{All:'all','Pre-Service':'pre','In-Service':'in'}[x]);
    if(b) b.className=`btn btn-sm ${x===s?'btn-primary':'btn-ghost'}`;
  });
  applyDriverFilter();
}
function applyDriverFilter() {
  const t=document.querySelector('#drivers-table tbody');
  if(!t) return;
  const filtered = DRIVERS.filter(d=>
    (driverFilter==='All'||d.status===driverFilter) &&
    d.name.toLowerCase().includes(driverSearch.toLowerCase())
  );
  t.innerHTML=renderDriverRows(filtered);
}

  const avg = Math.round(Object.values(btwScores).reduce((a,b)=>a+b,0)/skills.length*20);

  return `

    <div>
